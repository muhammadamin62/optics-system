<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Склад оправ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Твои базовые стили */
        .search-input-full {
            width: 100%;
            padding: 18px 20px;
            border-radius: 12px;
            border: 2px solid #444;
            background-color: #2d2d2d !important;
            color: #ffffff !important;
            font-size: 20px !important;
            outline: none;
            box-sizing: border-box;
            -webkit-text-fill-color: #ffffff !important;
        }

        .search-input-full:focus {
            border-color: #2196f3;
            background-color: #333 !important;
        }

        .search-button-wide {
            width: 100%;
            padding: 15px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .item-card {
            background: #1f1f1f;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            position: relative; /* Для позиционирования меню */
        }

        /* Стили для ТРЕХ ТОЧЕК */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .dots-btn {
            cursor: pointer;
            color: #888;
            font-size: 24px;
            line-height: 1;
            padding: 0 5px;
            transition: 0.3s;
        }

        .dots-btn:hover { color: #4ade80; }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 15px;
            top: 45px;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 100;
            min-width: 160px;
            overflow: hidden;
        }

        .dropdown-menu a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
            transition: 0.2s;
        }

        .dropdown-menu a:hover { background: #3d3d3d; color: #4ade80; }
        .show { display: block !important; }

        /* Стиль МОДАЛЬНОГО ОКНА */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1f1f1f;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #444;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body style="background-color: #121212; color: white;">

<div class="container" style="max-width: 1000px; margin: 0 auto; padding: 20px;">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <a href="{{ url_for('seller_dashboard') }}" class="back-btn" style="text-decoration: none; color: #2196f3; font-weight: bold;">⬅ Назад</a>
        <h1 style="margin: 0;">🕶 Склад оправ</h1>
    </div>

    <div style="margin-bottom: 30px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333;">
        <form action="{{ request.path }}" method="GET">
            <label style="color: #888; font-size: 14px; margin-bottom: 8px; display: block;">Поиск оправы:</label>
            <input type="text" name="search" value="{{ search_query if search_query }}"
                   placeholder="Название оправы..." class="search-input-full" autocomplete="off">
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="search-button-wide">Найти</button>
                {% if search_query %}
                <a href="{{ request.path }}" style="margin-top: 10px; background: #f44336; color: white; text-decoration: none; padding: 15px 25px; border-radius: 12px; display: flex; align-items: center; font-weight: bold;">✕</a>
                {% endif %}
            </div>
        </form>
    </div>

    <a class="btn" href="/seller/frames/add" style="background: #4ade80; color: #000; font-weight: bold; text-decoration: none; padding: 15px 25px; border-radius: 12px; display: inline-block; margin-bottom: 30px;">
        ➕ Добавить новую оправу
    </a>

    <div class="inventory-grid">
        {% for frame in frames %}
        <div class="item-card" style="border-left: 6px solid {% if frame.stock <= 5 %}#ef4444{% else %}#4ade80{% endif %};">

            <div class="card-header">
                <h3 style="margin: 0; padding-right: 20px;">{{ frame.name }}</h3>
                <div class="dots-btn" onclick="toggleMenu(event, 'menu-{{ frame.id }}')">⋮</div>
                <div id="menu-{{ frame.id }}" class="dropdown-menu">
                    <a href="javascript:void(0)" onclick="openEditModal('{{ frame.id }}', '{{ frame.name }}', '{{ frame.sell_price }}', '{{ frame.stock }}')">✏️ Редактировать</a>
                    <a href="{{ url_for('delete_frame', id=frame.id) }}" style="color: #ef4444;" onclick="return confirm('Удалить эту оправу?')">🗑 Удалить</a>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span style="color: #888;">Цена:</span>
                <span style="color: #4ade80; font-weight: bold;">{{ frame.sell_price }} сум</span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span style="color: #888;">Остаток:</span>
                <b style="color: {% if frame.stock <= 5 %}#ef4444{% else %}#fff{% endif %};">
                    {{ frame.stock }} шт.
                </b>
            </div>
        </div>
        {% else %}
        <div style="grid-column: 1/-1; text-align: center; padding: 50px; opacity: 0.5;">
            <p>Ничего не найдено</p>
        </div>
        {% endfor %}
    </div>
</div>

<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="margin-top: 0; color: #4ade80;">Редактирование</h2>
        <form id="editForm" method="POST">
            <div style="margin-bottom: 15px;">
                <label style="color: #888; font-size: 13px;">Название оправы</label>
                <input type="text" name="name" id="editName" class="search-input-full" style="padding: 12px; font-size: 16px !important;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="color: #888; font-size: 13px;">Цена (сум)</label>
                <input type="number" name="price" id="editPrice" class="search-input-full" style="padding: 12px; font-size: 16px !important;">
            </div>
            <div style="margin-bottom: 25px;">
                <label style="color: #888; font-size: 13px;">Количество на складе</label>
                <input type="number" name="stock" id="editStock" class="search-input-full" style="padding: 12px; font-size: 16px !important;">
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="search-button-wide" style="margin: 0;">Сохранить</button>
                <button type="button" onclick="closeModal()" class="search-button-wide" style="margin: 0; background: #444;">Отмена</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Показ/скрытие меню "три точки"
    function toggleMenu(event, id) {
        event.stopPropagation();
        document.querySelectorAll('.dropdown-menu').forEach(m => {
            if (m.id !== id) m.classList.remove('show');
        });
        document.getElementById(id).classList.toggle('show');
    }

    // Закрытие меню при клике по экрану
    window.onclick = function() {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
    }

    // Работа с модальным окном
    function openEditModal(id, name, price, stock) {
        document.getElementById('editForm').action = '/seller/frames/edit/' + id;
        document.getElementById('editName').value = name;
        document.getElementById('editPrice').value = price;
        document.getElementById('editStock').value = stock;
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
    }
    function openEditModal(id, name, price, stock) {
    // Эта строка создает путь: /seller/frames/edit/5
    document.getElementById('editForm').action = '/seller/frames/edit/' + id;

    document.getElementById('editName').value = name;
    document.getElementById('editPrice').value = price;
    document.getElementById('editStock').value = stock;
    document.getElementById('editModal').style.display = 'flex';
}
</script>

</body>
</html>
